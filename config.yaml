# TODO: add papers by configuration file
base_url: "https://arxiv.paperswithcode.com/api/v0/papers/"
user_name: "Confetti-lxy"
repo_name: "cv-arxiv-daily"
show_authors: True
show_links: True
show_badge: True
max_results: 20

publish_readme: True
publish_gitpage: True
publish_wechat: Ture

# file paths
json_readme_path: './docs/cv-arxiv-daily.json'
json_gitpage_path: './docs/cv-arxiv-daily-web.json'
json_wechat_path: './docs/cv-arxiv-daily-wechat.json'

md_readme_path: 'README.md'
md_gitpage_path: './docs/index.md'
md_wechat_path: './docs/wechat.md'

# keywords to search
keywords:
    "Single Object & Visual Language Tracking":
        filters: ["SOT", "Single Object Tracking", "Visual Object Tracking", "Visual Tracking", "Transformer-based Tracking", "Transformer Tracking", "Efficient Visual Tracking", "VLT", "Visual Language Tracking", "Natural Language Tracking", "Vision-Language Object Tracking", "Vision-Language Tracking"]
    "Diffusion":
        filters: ["Diffusion", "DLLM", "Sora", "LLaDA", "Diffusion Language Models", "Diffusion LLM", "Diffusion Large Language Models"]
    "Multi-modal Learning":
        filters: ["Multi-modal Learning", "Cross-modal", "Alignment", "Retrieval", "Reasoning", "Perception", "Adaptation", "Temporal Modeling"]

